<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Upload Dokumen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen font-sans p-4">

    <div class="w-full max-w-2xl bg-gray-800 rounded-2xl shadow-2xl p-8 border border-gray-700">
        <div class="flex items-center gap-3 mb-6">
            <div class="w-12 h-12 rounded-full bg-purple-500 flex items-center justify-center">
                <i class="fa-solid fa-upload text-white text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-2xl">Admin Panel</h1>
                <p class="text-sm text-gray-400">Upload dokumen untuk AI Assistant</p>
            </div>
        </div>

        <form id="upload-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2">Pilih File (TXT, MD, atau Text-based)</label>
                <input 
                    type="file" 
                    id="file-input" 
                    accept=".txt,.md,.csv,.json"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-purple-500 file:text-white hover:file:bg-purple-600"
                >
                <p class="text-xs text-gray-400 mt-2">💡 Format yang didukung: .txt, .md, .csv, .json</p>
            </div>

            <button 
                type="submit" 
                id="submit-btn"
                class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-lg transition-colors flex items-center justify-center gap-2 disabled:opacity-50"
            >
                <i class="fa-solid fa-cloud-arrow-up"></i>
                Upload Dokumen
            </button>
        </form>

        <div id="status" class="mt-4 hidden">
            <div class="p-4 rounded-lg bg-green-500/20 border border-green-500 text-green-400">
                <i class="fa-solid fa-check-circle mr-2"></i>
                <span id="status-text">File berhasil di-upload!</span>
            </div>
        </div>

        <div class="mt-6 pt-6 border-t border-gray-700 flex justify-between items-center">
            <a href="/chat" class="text-purple-400 hover:text-purple-300 flex items-center gap-2">
                <i class="fa-solid fa-comments"></i>
                Ke halaman Chat →
            </a>
            <button onclick="clearHistory()" class="text-red-400 hover:text-red-300 text-sm">
                <i class="fa-solid fa-trash"></i> Clear Chat History
            </button>
        </div>
    </div>

    <script>
        const uploadForm = document.getElementById('upload-form');
        const fileInput = document.getElementById('file-input');
        const submitBtn = document.getElementById('submit-btn');
        const statusDiv = document.getElementById('status');
        const statusText = document.getElementById('status-text');

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Pilih file dulu!');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Uploading...';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    statusDiv.classList.remove('hidden');
                    statusText.textContent = `File "${data.fileName}" berhasil di-upload ke Blob Storage!`;
                    fileInput.value = '';
                    
                    setTimeout(() => {
                        statusDiv.classList.add('hidden');
                    }, 5000);
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Upload gagal: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Upload Dokumen';
            }
        });

        async function clearHistory() {
            if (confirm('Yakin mau hapus semua chat history?')) {
                try {
                    await fetch('/api/history', {
                        method: 'DELETE'
                    });
                    alert('Chat history berhasil dihapus!');
                } catch (error) {
                    alert('Gagal hapus history: ' + error.message);
                }
            }
        }
    </script>
</body>
</html>
